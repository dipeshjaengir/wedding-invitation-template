<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="100%" height="100%">
  <defs>
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#050505" stop-opacity="0" />
    </radialGradient>
  </defs>
  <!-- Background Glow -->
  <rect width="400" height="500" fill="url(#goldGlow)" />
  
  <!-- Outer border frame -->
  <rect x="20" y="20" width="360" height="460" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.3" rx="10" />
  <rect x="25" y="25" width="350" height="450" fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.15" rx="8" />

  <!-- Ornamental Mandala behind -->
  <circle cx="200" cy="220" r="100" fill="none" stroke="#D4AF37" stroke-width="0.75" opacity="0.25" stroke-dasharray="2 4" />
  <circle cx="200" cy="220" r="85" fill="none" stroke="#F5E6B3" stroke-width="0.5" opacity="0.2" />

  <!-- Line Art of Indian Groom -->
  <g stroke="#D4AF37" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Turban (Pagri) contour -->
    <path d="M160,160 C160,110 240,110 240,160" stroke-width="2" />
    <path d="M150,150 C150,130 180,120 200,135 C220,120 250,130 250,150" stroke-width="1.5" />
    <!-- Turban folds/lines -->
    <path d="M152,145 Q200,125 248,145" stroke-width="1" />
    <path d="M156,135 Q200,115 244,135" stroke-width="1" />
    <path d="M165,125 Q200,105 235,125" stroke-width="1" />
    
    <!-- Feather (Kalgi) -->
    <path d="M200,125 C200,90 205,80 205,70 C205,80 210,90 200,125" stroke-width="1.25" fill="none" />
    <path d="M200,95 Q190,85 195,80 Q200,85 200,95" stroke-width="0.75" />
    <circle cx="200" cy="120" r="3" fill="#F5E6B3" />
    
    <!-- Face outline -->
    <path d="M172,210 C172,280 228,280 228,210" stroke-width="1.5" />
    
    <!-- Groom collar and Sherwani -->
    <path d="M165,280 L185,280 L200,310 L215,280 L235,280" stroke-width="1.5" />
    <path d="M200,310 L200,420" stroke-width="1.5" />
    
    <!-- Buttons/Design on Sherwani -->
    <circle cx="200" cy="330" r="2.5" fill="#F5E6B3" stroke="none" />
    <circle cx="200" cy="355" r="2.5" fill="#F5E6B3" stroke="none" />
    <circle cx="200" cy="380" r="2.5" fill="#F5E6B3" stroke="none" />
    <circle cx="200" cy="405" r="2.5" fill="#F5E6B3" stroke="none" />

    <!-- Shoulders -->
    <path d="M150,300 C150,290 160,280 180,280 C200,280 220,280 220,280" stroke-width="1.5" />
    <path d="M130,420 L150,305 C170,305 230,305 250,305 L270,420" stroke-width="2" />
    
    <!-- Royal Necklace/Stole (Sherwani Mala) -->
    <path d="M175,280 C175,320 225,320 225,280" stroke-width="1" stroke-dasharray="1 3" />
    <path d="M170,280 C170,335 230,335 230,280" stroke-width="1.25" stroke-dasharray="1 4" />
  </g>

  <!-- Typography Labels inside image -->
  <text x="200" y="445" font-family="'Cinzel', serif" font-size="18" fill="#D4AF37" font-weight="bold" text-anchor="middle" letter-spacing="3">THE GROOM</text>
</svg>
