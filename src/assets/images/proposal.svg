<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
  <rect width="300" height="300" fill="none"/>
  <!-- Decorative border -->
  <rect x="15" y="15" width="270" height="270" fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.3" rx="4" />
  
  <!-- Line Art: Proposal / Rings -->
  <g stroke="#D4AF37" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5">
    <!-- Starry background stars -->
    <path d="M60,60 L62,65 L67,65 L63,68 L65,73 L60,70 L55,73 L57,68 L53,65 L58,65 Z" stroke-width="0.5" fill="none" opacity="0.4"/>
    <path d="M240,70 L241,73 L245,73 L242,75 L243,79 L240,77 L237,79 L238,75 L235,73 L239,73 Z" stroke-width="0.5" fill="none" opacity="0.4"/>
    
    <!-- Intertwined Rings -->
    <!-- Ring 1 (Female Diamond Ring) -->
    <circle cx="130" cy="160" r="35" stroke-width="2" />
    <path d="M120,123 L130,113 L140,123 Z" stroke-width="1.5" />
    <circle cx="130" cy="111" r="5" fill="#F5E6B3" stroke="#D4AF37" stroke-width="1"/>
    
    <!-- Ring 2 (Male Band) -->
    <circle cx="170" cy="160" r="35" stroke-width="2" />
  </g>
  
  <!-- Sparkle Lines around Diamond -->
  <line x1="130" y1="100" x2="130" y2="90" stroke="#F5E6B3" stroke-width="1" />
  <line x1="118" y1="105" x2="110" y2="98" stroke="#F5E6B3" stroke-width="1" />
  <line x1="142" y1="105" x2="150" y2="98" stroke="#F5E6B3" stroke-width="1" />
</svg>
