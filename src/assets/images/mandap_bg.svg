      <path d="M50,150 L50,80 C50,45 35,30 50,10 C65,30 50,45 50,80 L50,150" fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.1" />
      <path d="M0,80 C0,40 15,20 50,10 C85,20 100,40 100,80 L100,150 L0,150 Z" fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.1" />
