<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <rect width="400" height="400" fill="#111111"/>
  <rect x="15" y="15" width="370" height="370" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.3" />
  
  <!-- Line Art: Sacred Lotus flower (Kamal) -->
  <g stroke="#D4AF37" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5">
    <!-- Center petal -->
    <path d="M200,120 Q180,180 200,240 Q220,180 200,120" />
    
    <!-- Left petals -->
    <path d="M200,140 Q160,190 200,240" />
    <path d="M200,165 Q130,200 185,240" />
    <path d="M200,195 Q110,215 170,245" />

    <!-- Right petals -->
    <path d="M200,140 Q240,190 200,240" />
    <path d="M200,165 Q270,200 215,240" />
    <path d="M200,195 Q290,215 230,245" />

    <!-- Bottom lotus leaf base -->
    <path d="M140,250 C160,270 240,270 260,250 Q200,280 140,250 Z" fill="#F5E6B3" opacity="0.2" />
    
    <!-- Water ripples/waves underneath -->
    <path d="M120,280 C150,290 250,290 280,280" stroke-width="0.75" opacity="0.5" />
    <path d="M150,295 C170,300 230,300 250,295" stroke-width="0.5" opacity="0.3" />
  </g>
  <text x="200" y="360" font-family="'Cinzel', serif" font-size="12" fill="#F5E6B3" font-weight="bold" text-anchor="middle" letter-spacing="3" opacity="0.6">THE SACRED LOTUS</text>
</svg>
