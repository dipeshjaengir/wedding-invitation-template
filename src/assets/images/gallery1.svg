<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <rect width="400" height="400" fill="#111111"/>
  <!-- Decorative border frame -->
  <rect x="15" y="15" width="370" height="370" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.3" />
  <circle cx="200" cy="200" r="150" fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.2" />

  <!-- Royal Mandala Line Art -->
  <g stroke="#D4AF37" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="200" cy="200" r="30" stroke-width="1.5" />
    <circle cx="200" cy="200" r="60" stroke-width="1" stroke-dasharray="3 3" />
    <circle cx="200" cy="200" r="90" stroke-width="1" />
    <circle cx="200" cy="200" r="120" stroke-width="0.5" stroke-dasharray="1 4" />
    
    <!-- Mandala Spoke Rays -->
    <path d="M200,50 L200,350 M50,200 L350,200 M94,94 L306,306 M94,306 L306,94" stroke-width="0.5" opacity="0.3" />
    
    <!-- Petals -->
    <path d="M200,140 Q215,115 200,90 Q185,115 200,140 Z" stroke-width="1.25"/>
    <path d="M200,260 Q215,285 200,310 Q185,285 200,260 Z" stroke-width="1.25"/>
    <path d="M140,200 Q115,215 90,200 Q115,185 140,200 Z" stroke-width="1.25"/>
    <path d="M260,200 Q285,215 310,200 Q285,185 260,200 Z" stroke-width="1.25"/>
  </g>
  <text x="200" y="360" font-family="'Cinzel', serif" font-size="12" fill="#F5E6B3" font-weight="bold" text-anchor="middle" letter-spacing="3" opacity="0.6">MANDALA OF LOVE</text>
</svg>
