<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <rect width="400" height="400" fill="#111111"/>
  <rect x="15" y="15" width="370" height="370" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.3" />
  
  <!-- Line Art: Traditional Shehnai & Sitar details -->
  <g stroke="#D4AF37" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5">
    <!-- Shehnai 1 (Slanted left to right) -->
    <path d="M120,280 L280,120" stroke-width="2" />
    <path d="M280,120 L290,110 L295,115 L285,125 Z" />
    <!-- Flared mouth of Shehnai -->
    <path d="M120,280 C110,275 90,290 80,310 C100,320 115,300 120,280 Z" />
    <circle cx="100" cy="295" r="8" opacity="0.4" />
    
    <!-- Shehnai 2 (Slanted right to left, intersecting) -->
    <path d="M280,280 L120,120" stroke-width="2" />
    <path d="M120,120 L110,110 L105,115 L115,125 Z" />
    <!-- Flared mouth of Shehnai 2 -->
    <path d="M280,280 C290,275 310,290 320,310 C300,320 285,300 280,280 Z" />
    <circle cx="300" cy="295" r="8" opacity="0.4" />

    <!-- Finger Holes along pipes -->
    <circle cx="170" cy="230" r="2.5" fill="#F5E6B3" stroke="none" />
    <circle cx="190" cy="210" r="2.5" fill="#F5E6B3" stroke="none" />
    <circle cx="210" cy="190" r="2.5" fill="#F5E6B3" stroke="none" />
    <circle cx="230" cy="170" r="2.5" fill="#F5E6B3" stroke="none" />
    
    <circle cx="230" cy="230" r="2.5" fill="#F5E6B3" stroke="none" />
    <circle cx="210" cy="210" r="2.5" fill="#F5E6B3" stroke="none" />
    <circle cx="190" cy="190" r="2.5" fill="#F5E6B3" stroke="none" />
    <circle cx="170" cy="170" r="2.5" fill="#F5E6B3" stroke="none" />
  </g>
  <text x="200" y="360" font-family="'Cinzel', serif" font-size="12" fill="#F5E6B3" font-weight="bold" text-anchor="middle" letter-spacing="3" opacity="0.6">ROYAL SHEHNAI</text>
</svg>
