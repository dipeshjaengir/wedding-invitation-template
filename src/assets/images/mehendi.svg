<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
  <rect width="300" height="300" fill="none"/>
  <!-- Decorative border -->
  <circle cx="150" cy="150" r="100" fill="none" stroke="#D4AF37" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.3"/>

  <!-- Detailed Henna Mandala design -->
  <g stroke="#D4AF37" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Center circle and petals -->
    <circle cx="150" cy="150" r="15" stroke-width="1.5" />
    <circle cx="150" cy="150" r="22" stroke-dasharray="2 2" />
    
    <!-- Mandala Petals -->
    <path d="M150,128 C145,135 155,135 150,128 Z" stroke-width="1" />
    <path d="M150,172 C145,165 155,165 150,172 Z" stroke-width="1" />
    <path d="M128,150 C135,145 135,155 128,150 Z" stroke-width="1" />
    <path d="M172,150 C165,145 165,155 172,150 Z" stroke-width="1" />
    
    <!-- Outer rings -->
    <circle cx="150" cy="150" r="45" stroke-width="1" opacity="0.7" />
    <circle cx="150" cy="150" r="55" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.5" />
    
    <!-- Paisley curls (Traditional mehndi motifs) radiating outward -->
    <path d="M150,95 Q170,80 180,95 Q170,110 150,105" stroke-width="1.25" />
    <path d="M150,205 Q130,220 120,205 Q130,190 150,195" stroke-width="1.25" />
    <path d="M95,150 Q80,130 95,120 Q110,130 105,150" stroke-width="1.25" />
    <path d="M205,150 Q220,170 205,180 Q190,170 195,150" stroke-width="1.25" />
    
    <!-- Soft dots in mandala -->
    <circle cx="150" cy="80" r="2" fill="#F5E6B3" />
    <circle cx="150" cy="220" r="2" fill="#F5E6B3" />
    <circle cx="80" cy="150" r="2" fill="#F5E6B3" />
    <circle cx="220" cy="150" r="2" fill="#F5E6B3" />
  </g>
</svg>
