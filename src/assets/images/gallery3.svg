<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <rect width="400" height="400" fill="#111111"/>
  <rect x="15" y="15" width="370" height="370" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.3" />
  
  <!-- Line Art: Traditional Peacock feather / Paisley flourish -->
  <g stroke="#D4AF37" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5">
    <!-- Peacock feather contour -->
    <path d="M200,320 C200,320 280,240 280,170 C280,100 200,80 200,80 C200,80 120,100 120,170 C120,240 200,320 200,320 Z" />
    
    <!-- Inner concentric rings for the "eye" of the feather -->
    <path d="M200,210 C200,210 240,180 240,150 C240,110 200,100 200,100 C200,100 160,110 160,150 C160,180 200,210 200,210 Z" stroke-width="1" opacity="0.8" />
    <path d="M200,175 C200,175 220,160 220,145 C220,125 200,120 200,120 C200,120 180,125 180,145 C180,160 200,175 200,175 Z" stroke-width="1" fill="#F5E6B3" opacity="0.3" />
    
    <!-- Feather strands radiating out -->
    <line x1="120" y1="170" x2="160" y2="165" stroke-width="0.75" opacity="0.5" />
    <line x1="280" y1="170" x2="240" y2="165" stroke-width="0.75" opacity="0.5" />
    
    <line x1="130" y1="140" x2="165" y2="145" stroke-width="0.75" opacity="0.5" />
    <line x1="270" y1="140" x2="235" y2="145" stroke-width="0.75" opacity="0.5" />

    <line x1="145" y1="115" x2="175" y2="125" stroke-width="0.75" opacity="0.5" />
    <line x1="255" y1="115" x2="225" y2="125" stroke-width="0.75" opacity="0.5" />
    
    <!-- Stem of feather -->
    <path d="M200,320 Q200,350 205,370" stroke-dasharray="2 2" />
  </g>
  <text x="200" y="360" font-family="'Cinzel', serif" font-size="12" fill="#F5E6B3" font-weight="bold" text-anchor="middle" letter-spacing="3" opacity="0.6">MAYUR FEATHER</text>
</svg>
