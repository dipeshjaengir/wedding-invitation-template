<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
  <rect width="300" height="300" fill="none"/>
  <!-- Circle backdrop -->
  <circle cx="150" cy="150" r="100" fill="none" stroke="#D4AF37" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.3"/>
  
  <g stroke="#D4AF37" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5">
    <!-- Traditional Kalash / Clay Pot -->
    <path d="M110,210 L190,210 C185,230 175,240 150,240 C125,240 115,230 110,210 Z" />
    <path d="M110,210 C110,180 120,160 150,160 C180,160 190,180 190,210" />
    <!-- Rim of the pot -->
    <ellipse cx="150" cy="160" rx="25" ry="6" />
    
    <!-- Marigold flowers floating/heaped on top -->
    <circle cx="150" cy="148" r="8" fill="#F5E6B3" stroke="#D4AF37" stroke-width="1" />
    <circle cx="138" cy="154" r="7" fill="#F5E6B3" stroke="#D4AF37" stroke-width="1"/>
    <circle cx="162" cy="154" r="7" fill="#F5E6B3" stroke="#D4AF37" stroke-width="1"/>
    <circle cx="145" cy="140" r="6" fill="#F5E6B3" stroke="#D4AF37" stroke-width="1"/>
    <circle cx="155" cy="140" r="6" fill="#F5E6B3" stroke="#D4AF37" stroke-width="1"/>

    <!-- Decorative Paisley/Leaf flourishes at the side -->
    <path d="M80,220 C70,200 80,180 95,190 C90,175 105,170 110,185" stroke-width="0.75" opacity="0.6"/>
    <path d="M220,220 C230,200 220,180 205,190 C210,175 195,170 190,185" stroke-width="0.75" opacity="0.6"/>
  </g>
</svg>
