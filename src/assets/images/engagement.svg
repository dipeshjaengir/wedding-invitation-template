<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
  <rect width="300" height="300" fill="none"/>
  <!-- Decorative border -->
  <rect x="15" y="15" width="270" height="270" fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.3" rx="4" />
  
  <!-- Line Art: Joining Hands -->
  <g stroke="#D4AF37" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5">
    <!-- Traditional Floral Frame behind hands -->
    <path d="M70,150 C70,100 110,60 150,60 C190,60 230,100 230,150" stroke-width="0.75" stroke-dasharray="1 3" opacity="0.4"/>
    
    <!-- Left Hand (Groom holding Bride's hand) -->
    <path d="M40,160 Q80,160 120,165 C130,165 140,160 150,150" stroke-width="2"/>
    <!-- Right Hand (Bride's hand resting on top) -->
    <path d="M260,140 Q210,155 170,155 C160,155 150,150 140,140" stroke-width="1.5"/>
    
    <!-- Bangles on Bride's wrist -->
    <path d="M210,146 Q215,156 220,144" stroke-width="1" />
    <path d="M215,145 Q220,155 225,143" stroke-width="1" />
    <path d="M220,144 Q225,154 230,142" stroke-width="1" fill="none" />
    
    <!-- Heart outline floating above -->
    <path d="M150,110 C145,100 130,100 130,115 C130,130 150,145 150,145 C150,145 170,130 170,115 C170,100 155,100 150,110 Z" stroke-width="1" opacity="0.5"/>
  </g>
</svg>
